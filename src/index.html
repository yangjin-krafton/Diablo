<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Diablo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #game-root {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }
        body {
            color: #e6e6e6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #game-root { position: fixed; inset: 0; }
        #game-canvas { display: block; width: 100%; height: 100%; }
        #hud {
            position: fixed; top: 12px; left: 12px;
            font-size: 13px; color: #d8d8d8;
            text-shadow: 0 1px 2px #000;
            pointer-events: none;
            line-height: 1.5;
        }
        #hud .label { color: #888; margin-right: 6px; }
        #controls {
            position: fixed; bottom: 12px; left: 12px;
            font-size: 11px; color: #888;
            text-shadow: 0 1px 2px #000;
            pointer-events: none;
        }
        #loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: #0a0a0a; color: #b82020;
            font-size: 20px; letter-spacing: 0.2em;
            transition: opacity 0.4s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }

        /* virtual joystick (mobile) — positioned by input.js */
        .joy {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            display: none;
            z-index: 10;
        }
        #joy-base {
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(255, 255, 255, 0.22);
        }
        #joy-stick {
            width: 60px; height: 60px;
            background: rgba(255, 90, 90, 0.28);
            border: 2px solid rgba(255, 120, 120, 0.6);
            z-index: 11;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="game-root">
        <canvas id="game-canvas"></canvas>
    </div>
    <div id="hud">
        <div><span class="label">HP</span><span id="hud-hp">-</span></div>
        <div><span class="label">KILLS</span><span id="hud-kills">0</span></div>
        <div><span class="label">ENEMIES</span><span id="hud-enemies">0</span></div>
    </div>
    <div id="controls">WASD / 방향키 · 모바일: 화면 드래그 · 근접 시 자동 공격</div>
    <div id="loading">LOADING</div>
    <div id="joy-base" class="joy"></div>
    <div id="joy-stick" class="joy"></div>
    <script type="module" src="./js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/svg+xml" href="./asset/icon.svg" />
    <title>Diablo</title>
    <link rel="stylesheet" href="./css/base.css" />
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
            "pixi.js": "https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.min.mjs"
        }
    }
    </script>
</head>
<body>
    <div id="game-root">
        <canvas id="game-canvas"></canvas>
    </div>
    <div id="controls">WASD / 방향키 · 모바일: 화면 드래그 · 근접 시 자동 공격</div>
    <div id="loading">LOADING</div>
    <div id="joy-base" class="joy"></div>
    <div id="joy-stick" class="joy"></div>
    <!-- HUD / skill bar / skill tree panel are rendered by Pixi into #ui-canvas (appended by UIRoot). -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>

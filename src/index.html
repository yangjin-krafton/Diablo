<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Diablo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            color: #e6e6e6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }
        #game-root {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #game-canvas {
            display: block;
            background: #111;
            box-shadow: 0 0 40px rgba(180, 30, 30, 0.25);
            image-rendering: pixelated;
        }
        #hud {
            position: fixed;
            top: 12px;
            left: 12px;
            font-size: 14px;
            color: #b0b0b0;
            letter-spacing: 0.02em;
            pointer-events: none;
        }
        #title {
            position: fixed;
            bottom: 16px;
            right: 16px;
            font-size: 12px;
            color: #5a5a5a;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="game-root">
        <canvas id="game-canvas" width="960" height="540"></canvas>
    </div>
    <div id="hud">Diablo · prototype</div>
    <div id="title">웹 기반 액션 RPG 프로토타입</div>

    <script>
        (() => {
            const canvas = document.getElementById("game-canvas");
            const ctx = canvas.getContext("2d");

            function resize() {
                const ratio = 16 / 9;
                const maxW = Math.min(window.innerWidth * 0.96, 1280);
                const maxH = Math.min(window.innerHeight * 0.92, maxW / ratio);
                const w = Math.min(maxW, maxH * ratio);
                canvas.style.width = w + "px";
                canvas.style.height = (w / ratio) + "px";
            }
            window.addEventListener("resize", resize);
            resize();

            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#b82020";
            ctx.font = "bold 36px -apple-system, sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("DIABLO", canvas.width / 2, canvas.height / 2 - 10);
            ctx.fillStyle = "#777";
            ctx.font = "14px sans-serif";
            ctx.fillText("이동만 직접 조작 · 스킬 자동 시전", canvas.width / 2, canvas.height / 2 + 20);
        })();
    </script>
</body>
</html>
